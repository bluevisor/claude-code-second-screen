name: NeoDashboard
options:
  bundleIdPrefix: tech.bluevisor
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
targets:
  NeoDashboard:
    type: application
    platform: macOS
    sources:
      - path: Sources/NeoDashboard
      - path: Resources/fonts
        buildPhase: resources
        excludes:
          - "*.txt"
      - path: Resources/icons
        buildPhase: resources
        excludes:
          - "*.svg"
    preBuildScripts:
      - name: Sync shared assets
        # Keep ../assets the canonical source of truth — copy into the
        # in-bundle Resources/ subdirs at build time so XcodeGen picks them up
        # without symlinks (which it doesn't follow reliably).
        script: |
          set -euo pipefail
          src_root="$SRCROOT/../assets"
          for sub in fonts icons; do
            dst="$SRCROOT/Resources/$sub"
            mkdir -p "$dst"
            rsync -a --delete "$src_root/$sub/" "$dst/"
          done
        inputFiles:
          - $(SRCROOT)/../assets/fonts
          - $(SRCROOT)/../assets/icons
        basedOnDependencyAnalysis: false
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: NeoDashboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: YES
        NSHumanReadableCopyright: "© 2026 Bluevisor"
        NSSupportsAutomaticTermination: NO
        NSSupportsSuddenTermination: NO
    entitlements:
      path: Resources/NeoDashboard.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.usb: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.bluevisor.NeoDashboard
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
schemes:
  NeoDashboard:
    build:
      targets:
        NeoDashboard: all
    run:
      config: Debug
